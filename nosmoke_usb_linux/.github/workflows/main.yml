# Сборка Linux-версии (SDL) при push в main/master
name: Build Linux

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libsdl2-dev libsdl2-image-dev

      - name: Configure and build
        run: |
          cmake -S . -B build
          cmake --build build -j

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: nosmoke-linux
          path: build/nosmoke
